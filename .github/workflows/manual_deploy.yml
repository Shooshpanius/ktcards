name: Manual and Auto Deploy

on:
  workflow_dispatch: # Позволяет запускать вручную из вкладки Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/docker/images/ktcards.ru
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S ./__BuildAll.sh
            cd /opt/docker/composer
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S ./_KTCARDS_REBASE.sh
            
