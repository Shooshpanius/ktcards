server
{

	listen	80;

	server_name ktcards.ru;

	# Redirect all HTTP traffic to HTTPS
	return 301 https://$host$request_uri;
}

server
{

	listen	443 ssl;

	server_name ktcards.ru;

	ssl_certificate     /etc/letsencrypt/live/ktcards.ru/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/ktcards.ru/privkey.pem;
	ssl_protocols       TLSv1.2 TLSv1.3;
	ssl_ciphers         HIGH:!aNULL:!MD5;

	resolver 8.8.8.8;

	client_max_body_size 20M;

	add_header X-Content-Type-Options "nosniff" always;
	add_header X-Frame-Options "SAMEORIGIN" always;
	add_header Referrer-Policy "strict-origin-when-cross-origin" always;
	add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
	add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; object-src 'none'; frame-ancestors 'none';" always;
	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

	location /
	{
		root   /usr/share/nginx/html;
		index  index.html index.htm;
		try_files $uri $uri/ /index.html;
		add_header Cross-Origin-Opener-Policy "same-origin-allow-popups";
	}


	location /api
	{
		proxy_pass http://back_ktcards:8080;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	location /uploads
	{
		proxy_pass http://back_ktcards:8080;
	}




}