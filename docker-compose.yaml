#########################################################################################################################################
#       Application KTCARDS
#########################################################################################################################################


  back_ktcards:
    container_name: back_ktcards
    image: back_ktcards:local
    restart: always
    depends_on:
      mariadb_ktcards:
        condition: service_healthy


  front_ktcards:
    container_name: front_ktcards
    image: front_ktcards:local
    ports:
      - "84:80"
    restart: always
    depends_on:
      - back_ktcards


  mariadb_ktcards:
    container_name: mariadb_ktcards
    image: mariadb:lts
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ktcards
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /opt/docker/data/_ktcards/mariadb_ktcards:/var/lib/mysql
    restart: always
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3
